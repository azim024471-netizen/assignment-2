<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Wave</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header  class="w-full bg-[#0f0624] border-b py-2  border-white/10">
        <nav class="max-w-7xl mx-auto flex items-center justify-between px-10 ">
            
            <div class=" flex items-center">
                <h2 class="text-2xl font-extrabold tracking-tight bg-linear-to-r from-[#F7E93F]
                 via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent select-none">
                    TechWave
                </h2>
            </div>

            <div class="md:flex hidden">
                <ul class="flex items-center space-x-12">
                    <li><a  class="text-white  hover:text-pink-500 transition-colors duration-200">About</a></li>
                    <li><a  class="text-white  hover:text-pink-500 transition-colors duration-200">Episodes</a></li>
                    <li><a  class="text-white  hover:text-pink-500 transition-colors duration-200">Host</a></li>
                </ul>
            </div>

            <button class=" hidden md:block px-5 py-2 rounded-full bg-linear-to-r from-[#F7E93F] via-[#FB09B4]
             to-[#9100F8] text-white text-sm font-semibold cursor-pointer">
                Subscribe &rarr;
            </button>
            
            <div class="md:hidden text-2xl text-white font-bold cursor-pointer p-2">☰</div>
        </nav>
    </header>


    <section  style="background-image: url('./assets/hero-bg.png');"
        class="relative  flex items-center justify-center text-center px-6 bg-cover bg-center overflow-hidden">
        
        <div class="relative z-10 flex flex-col items-center">
            <div class="relative mt-16 md:mt-8 w-40 h-40 md:w-96 md:h-96 flex items-center justify-center">
                <img src="./assets/hero-circle.png" alt="" class="absolute inset-0 w-full h-full object-cover" />

                <span class="absolute top-0 md:-top-1 right-1.5 md:right-8 bg-green-400 text-black text-xs
                 font-bold px-3 py-1 rounded-full z-20">
                    NEW
                </span>

                <div class="relative z-10 w-40 h-40 sm:w-44 sm:h-44 flex items-center justify-center">
                    <img src="./assets/microphone.png" alt="Microphone" class="w-10 sm:w-18" />
                </div>
            </div> 

            <h1 class="text-4xl sm:text-5xl font-bold text-[#FFFFFF] mt-6">
                Tech Wave
            </h1>

            <p class="text-[#FFFFFF] max-w-xl mt-4 text-sm sm:text-base">
                Your daily dose of tech insights, productivity hacks, and personal growth
            </p>

            <div class="flex gap-4 mt-6  justify-center">
                <button class="flex items-center gap-2 px-5 py-3 rounded-full bg-linear-to-r from-[#F7E93F] via-[#FB09B4]
                 to-[#9100F8] text-white text-sm font-semibold cursor-pointer">
                    <img src="./assets/spotify.png" alt="Spotify" class="w-4 h-4">
                    <span>Listen On Spotify</span>
                </button>

                <button class="px-5 group  py-3 rounded-full border border-green-400 text-green-400 hover:bg-green-400
                 hover:text-black transition-colors flex gap-2 items-center justify-center  font-semibold cursor-pointer">
                    <img src="./assets/message.png" alt="" class="w-4 h-4 group-hover:brightness-0 transition-all ">
                    <span>Subscribe</span>
                </button>

            </div>
        </div>
    </section>

<p class="text-orange-500">hello world

</p>
</body>

</html>
